* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a2332; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.gate { background: #fff; border-radius: 12px; padding: 40px; max-width: 380px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
.gate h2 { font-size: 18px; color: #1a2332; margin-bottom: 4px; }

.gate input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s; }
.gate input:focus { border-color: #4299e1; }
.gate input.error { border-color: #e74c3c; animation: shake 0.3s; }
.gate button { margin-top: 12px; width: 100%; padding: 12px; background: #1a2332; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.gate button:hover { background: #2d3748; }
.gate button:disabled { opacity: 0.6; cursor: wait; }
.gate .msg { font-size: 12px; margin-top: 8px; min-height: 16px; }
.gate .msg.error { color: #e74c3c; }
.gate .msg.info { color: #718096; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

    var ITER = 600000;

    function b64decode(s) {
        var bin = atob(s), arr = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
        return arr;
    }

    document.getElementById("form").addEventListener("submit", function(e) {
        e.preventDefault();
        var pw = document.getElementById("pw");
        var btn = document.getElementById("btn");
        var msg = document.getElementById("msg");
        btn.disabled = true;
        msg.className = "msg info";
        msg.textContent = "Decrypting...";

        var enc = new TextEncoder();
        crypto.subtle.importKey("raw", enc.encode(pw.value), "PBKDF2", false, ["deriveBits"]).then(function(baseKey) {
            return crypto.subtle.deriveBits({
                name: "PBKDF2",
                salt: b64decode(SALT),
                iterations: ITER,
                hash: "SHA-256"
            }, baseKey, 256);
        }).then(function(keyBits) {
            return crypto.subtle.importKey("raw", keyBits, "AES-GCM", false, ["decrypt"]);
        }).then(function(aesKey) {
            return crypto.subtle.decrypt({
                name: "AES-GCM",
                iv: b64decode(IV)
            }, aesKey, b64decode(CT));
        }).then(function(decrypted) {
            var html = new TextDecoder().decode(decrypted);
            document.open();
            document.write(html);
            document.close();
        }).catch(function() {
            btn.disabled = false;
            pw.classList.add("error");
            msg.className = "msg error";
            msg.textContent = "Incorrect password";
            setTimeout(function() { pw.classList.remove("error"); }, 400);
        });
    });
